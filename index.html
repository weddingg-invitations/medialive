<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>WorkSwap | Баланс Я и Замена 30/30</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), 0 4px 12px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            position: relative;
        }

        .app-header {
            padding: 24px 20px 16px 24px;
            background: white;
            border-bottom: 1px solid #f0eff5;
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e2b3c, #3d2a4a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .badge {
            background: #f0eef8;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #4a3a6a;
        }

        .sub {
            font-size: 0.75rem;
            color: #6c6f8c;
            margin-top: 6px;
            line-height: 1.35;
        }

        .date-section {
            padding: 14px 20px;
            background: #fafafd;
            border-bottom: 1px solid #efedf4;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .date-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            border: none;
            background: white;
            color: #2d3e50;
            border: 1px solid #e2dfed;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn:hover{
            background: rgb(153, 255, 0);
        }

        .btn-primary {
            background: linear-gradient(105deg, #1e5b9e, #6a2c5c);
            color: white;
            border: none;
            box-shadow: 0 2px 6px rgba(106, 44, 92, 0.2);
        }

        .btn-primary:active { transform: scale(0.96); }
        .btn:active { transform: scale(0.96); }

        .date-picker {
            background: white;
            border: 1px solid #ddd9e8;
            border-radius: 40px;
            padding: 8px 14px;
            font-size: 0.75rem;
            font-family: monospace;
            color: #1f1f2e;
        }

        .date-badge {
            background: #e9e5f2;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .segments-list {
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 180px;
        }

        .segment-card {
            background: #fefcff;
            border: 1px solid #eae3f0;
            border-radius: 28px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            transition: all 0.2s;
        }

        .time-pair {
            background: #f7f4fa;
            border-radius: 40px;
            padding: 5px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 130px;
        }

        .time-label {
            font-size: 0.65rem;
            font-weight: 600;
            color: #6a4c7a;
        }

        .time-input {
            background: transparent;
            border: none;
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 600;
            width: 75px;
            text-align: center;
            outline: none;
            color: #1e1e2a;
            border-bottom: 1px solid #cfc6df;
        }

        .remove-btn {
            background: #fff0f0;
            border: none;
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #bc5a5a;
            margin-left: auto;
            cursor: pointer;
            transition: 250ms;
        }

        .remove-btn:hover {
             background: #ff0000;
             color: white;
        }

        .empty-message {
            text-align: center;
            padding: 32px 20px;
            color: #9a95b0;
            font-size: 0.85rem;
            background: #fefcff;
            border-radius: 28px;
            border: 1px dashed #ddd6e8;
        }

        .action-buttons {
            padding: 8px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-btn {
            width: 100%;
            padding: 14px 0;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.9rem;
            border: none;
            background: linear-gradient(105deg, #1e5b9e, #6a2c5c);
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .action-btn:active { transform: scale(0.97); }

        .result-card {
            margin: 12px 20px 24px 20px;
            background: #fbfaff;
            border-radius: 32px;
            padding: 18px;
            border: 1px solid #edeaf3;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            padding: 10px 0;
            border-bottom: 1px solid #eceaf2;
        }

        .stat-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #3c3f5e;
        }

        .stat-number {
            font-family: monospace;
            font-weight: 700;
            background: #f0edf8;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        .month-stats {
            margin-top: 18px;
            background: #ffffff;
            border-radius: 28px;
            padding: 14px;
            border: 1px solid #eae6f2;
        }

        .diff-badge {
            margin-top: 14px;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .positive { background: #e2f3e4; color: #1a6e3a; border-left: 4px solid #2e9b62; }
        .negative { background: #ffe6e2; color: #bc4e2e; border-left: 4px solid #e07a4a; }
        .zero { background: #eef2fc; color: #2c5f8a; border-left: 4px solid #5c9bd5; }

        .footnote {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 14px;
            color: #8a89a4;
        }

        @media (max-width: 450px) {
            body { padding: 12px; }
            .segment-card { flex-direction: column; align-items: stretch; }
            .time-pair { justify-content: space-between; }
            .remove-btn { margin-left: 0; text-align: center; }
            .date-section { flex-direction: column; align-items: stretch; }
            .date-buttons { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <div class="title-row">
            <h1>⚖️ WorkSwap</h1>
            <span class="badge">30/30 чередование</span>
        </div>
        <div class="sub">📌 Я работаю 30 мин → Замена 30 мин. Каждый день — свои отрезки. Данные сохраняются в браузере.</div>
    </div>

    <div class="date-section">
        <div class="date-buttons">
            <button class="btn" id="prevDayBtn">◀ Вчера</button>
            <button class="btn" id="nextDayBtn">Завтра ▶</button>
            <button class="btn btn-primary" id="todayBtn">Сегодня</button>
        </div>
        <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
            <input type="date" id="datePicker" class="date-picker">
            <span id="currentDateBadge" class="date-badge">сегодня</span>
        </div>
    </div>

    <div id="segmentsContainer" class="segments-list"></div>

    <div class="action-buttons">
        <button id="addSegmentBtn" class="action-btn">+ Добавить мой отрезок</button>
        <button id="calcBtn" class="action-btn" style="background: linear-gradient(105deg, #2a5580, #8a3a78);">📊 ТОЧНЫЙ РАСЧЁТ</button>
    </div>

    <div class="result-card" id="resultBlock">
        <div class="stat-item">
            <span class="stat-label">👤 МОИ ЧАСЫ (сегодня)</span>
            <span class="stat-number" id="myMinutesDetail">0 ч</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">🔄 ЧАСЫ ЗАМЕНЫ (сегодня)</span>
            <span class="stat-number" id="partnerMinutesDetail">0 ч</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">📆 ОБЩЕЕ ВРЕМЯ</span>
            <span class="stat-number" id="totalVal">0 ч</span>
        </div>
        <div id="dayDiffInfo"></div>

        <div class="month-stats">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <span style="font-weight: 600;">🌙 МЕСЯЦ</span>
                <span id="monthName" style="font-size: 0.7rem; background: #eae6f2; padding: 4px 12px; border-radius: 30px;"></span>
            </div>
            <div class="stat-item" style="border-bottom: none; margin-top: 12px;">
                <span>🧑‍💻 Я (месяц)</span>
                <span class="stat-number" id="monthMyTotal">0 ч</span>
            </div>
            <div class="stat-item" style="border-bottom: none;">
                <span>🔄 Замена (месяц)</span>
                <span class="stat-number" id="monthPartnerTotal">0 ч</span>
            </div>
            <div id="monthBalanceBlock" class="diff-badge zero">⚖️ Загрузка...</div>
        </div>
        <div id="detailMsg" class="footnote"></div>
    </div>
</div>

<script>
    // ========== 30/30 ТОЧНАЯ ЛОГИКА ==========
    const EPOCH_START = new Date(2025, 0, 1, 0, 0, 0).getTime();
    const CYCLE_MS = 30 * 60 * 1000;
    
    function isMainWorking(timestamp) {
        let diff = timestamp - EPOCH_START;
        if (diff < 0) {
            let cycles = Math.ceil(-diff / CYCLE_MS);
            diff += cycles * CYCLE_MS;
        }
        let cycleIndex = Math.floor(diff / CYCLE_MS);
        return (cycleIndex % 2 === 0);
    }
    
    function getPartnerMinutes(startMs, endMs) {
        if (startMs >= endMs) return 0;
        let partner = 0;
        let cur = startMs;
        while (cur < endMs) {
            let mainNow = isMainWorking(cur);
            let diffEpoch = cur - EPOCH_START;
            let cycles = Math.floor(diffEpoch / CYCLE_MS);
            let slotEnd = EPOCH_START + (cycles + 1) * CYCLE_MS;
            let segEnd = Math.min(endMs, slotEnd);
            if (!mainNow) partner += (segEnd - cur);
            cur = segEnd;
        }
        return partner / 60000;
    }
    
    function formatTime(minutes) {
        let hrs = Math.floor(minutes / 60);
        let mins = Math.round(minutes % 60);
        if (mins === 60) { hrs++; mins = 0; }
        if (mins === 0) return `${hrs} ч`;
        return `${hrs} ч ${mins} мин`;
    }
    
    function formatTotalFromHours(hours) {
        let minsTotal = hours * 60;
        let hrs = Math.floor(minsTotal / 60);
        let mins = Math.round(minsTotal % 60);
        if (mins === 60) { hrs++; mins = 0; }
        if (mins === 0) return `${hrs} ч`;
        return `${hrs} ч ${mins} мин`;
    }
    
    // ========== LOCALSTORAGE ==========
    const STORAGE_KEY = "WorkSwap_IndependentDays_v9";
    
    function getStorageMap() {
        const raw = localStorage.getItem(STORAGE_KEY);
        try { return raw ? JSON.parse(raw) : {}; } catch(e) { return {}; }
    }
    
    function saveDaySegments(dateKey, segments) {
        const map = getStorageMap();
        // Сохраняем только непустые отрезки
        const filtered = segments.filter(s => s.start.trim() !== "" || s.end.trim() !== "");
        if (filtered.length === 0) {
            // Если нет отрезков — удаляем ключ из хранилища
            delete map[dateKey];
        } else {
            map[dateKey] = filtered;
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(map));
    }
    
    function loadDaySegments(dateKey) {
        const map = getStorageMap();
        return map[dateKey] ? [...map[dateKey]] : null;
    }
    
    // Проверка, есть ли вообще какие-то данные в хранилище
    function isStorageEmpty() {
        const map = getStorageMap();
        return Object.keys(map).length === 0;
    }
    
    // ========== ДАТА, ПАРСИНГ ==========
    let currentDisplayDate = new Date();
    
    function formatDateKey(date) {
        let y = date.getFullYear();
        let m = String(date.getMonth() + 1).padStart(2,'0');
        let d = String(date.getDate()).padStart(2,'0');
        return `${y}-${m}-${d}`;
    }
    
    function updateDateUI() {
        const key = formatDateKey(currentDisplayDate);
        const picker = document.getElementById('datePicker');
        if (picker) picker.value = key;
        const badge = document.getElementById('currentDateBadge');
        const todayKey = formatDateKey(new Date());
        if (badge) badge.innerHTML = key === todayKey ? "🔹 СЕГОДНЯ" : key;
        const monthSpan = document.getElementById('monthName');
        if (monthSpan) monthSpan.innerHTML = currentDisplayDate.toLocaleString('ru', { month: 'long', year: 'numeric' });
    }
    
    function parseTimeToMinutes(timeStr) {
        if (!timeStr || !timeStr.trim()) return null;
        let cleaned = timeStr.trim();
        let hours = null, minutes = null;
        let spaceParts = cleaned.split(/\s+/);
        if (spaceParts.length >= 2) {
            hours = parseInt(spaceParts[0],10);
            minutes = parseInt(spaceParts[1],10);
        } else {
            let colonParts = cleaned.split(':');
            if (colonParts.length >=2) {
                hours = parseInt(colonParts[0],10);
                minutes = parseInt(colonParts[1],10);
            }
        }
        if (isNaN(hours) || isNaN(minutes)) return null;
        if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return null;
        return { hours, minutes };
    }
    
    function getMySegmentsForDate(dateObj) {
        const rows = document.querySelectorAll('.segment-card');
        const targetDate = new Date(dateObj);
        targetDate.setHours(0,0,0,0);
        let segments = [];
        for (let row of rows) {
            const startInp = row.querySelector('.start-input');
            const endInp = row.querySelector('.end-input');
            if (!startInp || !endInp) continue;
            let startStr = startInp.value.trim();
            let endStr = endInp.value.trim();
            if (startStr === "" || endStr === "") continue;
            let startTime = parseTimeToMinutes(startStr);
            let endTime = parseTimeToMinutes(endStr);
            if (!startTime || !endTime) continue;
            let startDate = new Date(targetDate);
            startDate.setHours(startTime.hours, startTime.minutes,0,0);
            let endDate = new Date(targetDate);
            endDate.setHours(endTime.hours, endTime.minutes,0,0);
            let startMs = startDate.getTime();
            let endMs = endDate.getTime();
            if (endMs <= startMs) endMs += 24*3600000;
            if (endMs > startMs) segments.push({ startMs, endMs });
        }
        return segments;
    }
    
    function computeDayStats(segmentsTimestamps) {
        if (segmentsTimestamps.length === 0) return null;
        let myTotalMin = 0;
        for (let seg of segmentsTimestamps) myTotalMin += (seg.endMs - seg.startMs) / 60000;
        let globalStart = Math.min(...segmentsTimestamps.map(s => s.startMs));
        let globalEnd = Math.max(...segmentsTimestamps.map(s => s.endMs));
        let isMainAtEnd = isMainWorking(globalEnd);
        let extendedEnd = globalEnd;
        if (!isMainAtEnd) {
            let diff = globalEnd - EPOCH_START;
            let cycles = Math.floor(diff / CYCLE_MS);
            let nextSlot = EPOCH_START + (cycles + 1) * CYCLE_MS;
            extendedEnd = nextSlot;
        }
        let partnerMin = getPartnerMinutes(globalStart, extendedEnd);
        return { myTotalMin, partnerMin };
    }
    
    function createSegmentRow(startVal, endVal, onChangeCallback) {
        const div = document.createElement('div');
        div.className = 'segment-card';
        div.innerHTML = `
            <div class="time-pair">
                <span class="time-label">🟢 НАЧАЛО</span>
                <input type="text" placeholder="02 00" class="start-input time-input" value="${escapeHtml(startVal)}">
            </div>
            <div class="time-pair">
                <span class="time-label">🔴 КОНЕЦ</span>
                <input type="text" placeholder="02 30" class="end-input time-input" value="${escapeHtml(endVal)}">
            </div>
            <button class="remove-btn">✖ Удалить</button>
        `;
        const startInp = div.querySelector('.start-input');
        const endInp = div.querySelector('.end-input');
        const rmBtn = div.querySelector('.remove-btn');
        const handler = () => { if(onChangeCallback) onChangeCallback(); };
        startInp.addEventListener('input', handler);
        endInp.addEventListener('input', handler);
        rmBtn.addEventListener('click', () => { div.remove(); handler(); });
        return div;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
    }
    
    function saveCurrentDay() {
        const rows = document.querySelectorAll('.segment-card');
        let data = [];
        for(let row of rows) {
            const startInp = row.querySelector('.start-input');
            const endInp = row.querySelector('.end-input');
            if(startInp && endInp) {
                let s = startInp.value.trim(), e = endInp.value.trim();
                if(s || e) data.push({ start: s, end: e });
            }
        }
        const key = formatDateKey(currentDisplayDate);
        saveDaySegments(key, data);
    }
    
    function recalcAll() {
        const segments = getMySegmentsForDate(currentDisplayDate);
        if(segments.length === 0){
            document.getElementById('myMinutesDetail').innerHTML = "0 ч";
            document.getElementById('partnerMinutesDetail').innerHTML = "0 ч";
            document.getElementById('totalVal').innerHTML = "0 ч";
            document.getElementById('dayDiffInfo').innerHTML = '<div style="margin-top:10px; font-size:0.7rem;">⚡ Нет отрезков за этот день. Нажмите "+ Добавить"</div>';
        } else {
            const stats = computeDayStats(segments);
            let myToday = stats.myTotalMin, partnerToday = stats.partnerMin;
            document.getElementById('myMinutesDetail').innerHTML = formatTime(myToday);
            document.getElementById('partnerMinutesDetail').innerHTML = formatTime(partnerToday);
            let totalHours = (myToday + partnerToday) / 60;
            document.getElementById('totalVal').innerHTML = formatTotalFromHours(totalHours);
            let diff = myToday - partnerToday;
            let diffText = diff > 0 ? `📊 Разница дня: +${formatTime(Math.abs(diff))} (я больше)` : (diff < 0 ? `📊 Разница дня: -${formatTime(Math.abs(diff))} (замена больше)` : `📊 Разница дня: 0 (ровно)`);
            document.getElementById('dayDiffInfo').innerHTML = `<div style="margin-top:12px; background:#f0edf5; padding:8px 12px; border-radius:40px; text-align:center; font-size:0.75rem;">${diffText}</div>`;
        }
        document.getElementById('detailMsg').innerHTML = `🎯 отрезков: ${segments.length} | график 30/30`;
        
        // МЕСЯЦ
        const year = currentDisplayDate.getFullYear();
        const month = currentDisplayDate.getMonth();
        const allMap = getStorageMap();
        let totalMyMonth = 0, totalPartnerMonth = 0;
        for(let [dateKey, segs] of Object.entries(allMap)){
            const d = new Date(dateKey+"T12:00:00");
            if(d.getFullYear() === year && d.getMonth() === month && segs.length){
                let daySegments = [];
                const baseDate = new Date(d); baseDate.setHours(0,0,0,0);
                for(let seg of segs){
                    let st = parseTimeToMinutes(seg.start);
                    let en = parseTimeToMinutes(seg.end);
                    if(!st || !en) continue;
                    let startD = new Date(baseDate); startD.setHours(st.hours, st.minutes,0,0);
                    let endD = new Date(baseDate); endD.setHours(en.hours, en.minutes,0,0);
                    let startMs = startD.getTime();
                    let endMs = endD.getTime();
                    if(endMs <= startMs) endMs += 86400000;
                    if(endMs > startMs) daySegments.push({ startMs, endMs });
                }
                if(daySegments.length){
                    let myDayMin = 0;
                    for(let ds of daySegments) myDayMin += (ds.endMs - ds.startMs)/60000;
                    let globalStartDay = Math.min(...daySegments.map(s=>s.startMs));
                    let globalEndDay = Math.max(...daySegments.map(s=>s.endMs));
                    let isMainEnd = isMainWorking(globalEndDay);
                    let extEnd = globalEndDay;
                    if (!isMainEnd) {
                        let diffE = globalEndDay - EPOCH_START;
                        let cycles = Math.floor(diffE / CYCLE_MS);
                        let nextS = EPOCH_START + (cycles + 1) * CYCLE_MS;
                        extEnd = nextS;
                    }
                    let partnerDay = getPartnerMinutes(globalStartDay, extEnd);
                    totalMyMonth += myDayMin;
                    totalPartnerMonth += partnerDay;
                }
            }
        }
        document.getElementById('monthMyTotal').innerHTML = `${(totalMyMonth/60).toFixed(1)} ч (${formatTime(totalMyMonth)})`;
        document.getElementById('monthPartnerTotal').innerHTML = `${(totalPartnerMonth/60).toFixed(1)} ч (${formatTime(totalPartnerMonth)})`;
        let monthDiff = totalMyMonth - totalPartnerMonth;
        let monthBlock = document.getElementById('monthBalanceBlock');
        if(totalMyMonth === 0 && totalPartnerMonth === 0){
            monthBlock.innerHTML = `📭 Нет данных за месяц. Добавьте отрезки в любые дни.`;
            monthBlock.className = "diff-badge zero";
        } else {
            let signClass = monthDiff > 0 ? 'positive' : (monthDiff < 0 ? 'negative' : 'zero');
            monthBlock.className = `diff-badge ${signClass}`;
            let msg = '';
            if(monthDiff > 0) msg = `🔥 ПЕРЕРАБОТКА: вы работали БОЛЬШЕ на ${formatTime(monthDiff)} (${(monthDiff/60).toFixed(1)} ч)`;
            else if(monthDiff < 0) msg = `⚠️ ЗАМЕНА ПЕРЕРАБОТАЛА: на ${formatTime(-monthDiff)} (${(-monthDiff/60).toFixed(1)} ч) больше`;
            else msg = `🤝 ИДЕАЛЬНО: вы отработали одинаково (${formatTime(totalMyMonth)} каждый)`;
            monthBlock.innerHTML = `⚖️ ${msg}`;
        }
    }
    
    // Показывает пустой список (без демо)
    function showEmptyState() {
        const container = document.getElementById('segmentsContainer');
        container.innerHTML = '';
        const emptyDiv = document.createElement('div');
        emptyDiv.className = 'empty-message';
        emptyDiv.innerHTML = '📭 Нет отрезков за этот день<br>Нажмите «+ Добавить мой отрезок»';
        container.appendChild(emptyDiv);
    }
    
    function refreshUIForDate() {
        const key = formatDateKey(currentDisplayDate);
        const saved = loadDaySegments(key);
        const container = document.getElementById('segmentsContainer');
        container.innerHTML = '';
        
        if (saved && saved.length > 0) {
            for(let seg of saved){
                const row = createSegmentRow(seg.start || "", seg.end || "", () => { saveCurrentDay(); recalcAll(); });
                container.appendChild(row);
            }
        } else {
            // Пустой день — никаких демо-данных
            showEmptyState();
        }
        recalcAll();
    }
    
    // Инициализация при первом запуске: если хранилище пустое — создаём демо-данные для СЕГОДНЯ
    function initFirstLaunch() {
        if (isStorageEmpty()) {
            const todayKey = formatDateKey(new Date());
            const demoSegments = [
                { start: "02 00", end: "02 30" }, { start: "03 00", end: "03 30" },
                { start: "04 00", end: "04 30" }, { start: "05 00", end: "05 30" },
                { start: "06 00", end: "06 30" }, { start: "07 00", end: "07 30" },
                { start: "08 00", end: "08 30" }, { start: "09 00", end: "09 30" }
            ];
            saveDaySegments(todayKey, demoSegments);
        }
    }
    
    function addSegment() {
        const container = document.getElementById('segmentsContainer');
        // Удаляем пустое сообщение если есть
        const emptyMsg = container.querySelector('.empty-message');
        if (emptyMsg) emptyMsg.remove();
        
        const newRow = createSegmentRow("", "", () => { saveCurrentDay(); recalcAll(); });
        container.appendChild(newRow);
        saveCurrentDay();
        recalcAll();
    }
    
    function changeDay(delta){
        let nd = new Date(currentDisplayDate);
        nd.setDate(nd.getDate() + delta);
        currentDisplayDate = nd;
        updateDateUI();
        refreshUIForDate();
    }
    
    function setToday(){
        currentDisplayDate = new Date();
        updateDateUI();
        refreshUIForDate();
    }
    
    function onPickerChange(e){
        if(e.target.value){
            currentDisplayDate = new Date(e.target.value+"T12:00:00");
            updateDateUI();
            refreshUIForDate();
        }
    }
    
    // Запуск
    initFirstLaunch();
    updateDateUI();
    refreshUIForDate();
    
    document.getElementById('addSegmentBtn').addEventListener('click', addSegment);
    document.getElementById('calcBtn').addEventListener('click', () => recalcAll());
    document.getElementById('prevDayBtn').addEventListener('click', () => changeDay(-1));
    document.getElementById('nextDayBtn').addEventListener('click', () => changeDay(1));
    document.getElementById('todayBtn').addEventListener('click', setToday);
    document.getElementById('datePicker').addEventListener('change', onPickerChange);
</script>
</body>
</html>
